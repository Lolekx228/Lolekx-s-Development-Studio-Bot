<!doctype html>
<html lang="ru" class="dark" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LDS Message Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginView" class="login-view hidden">
    <form id="loginForm" class="login-card">
      <div class="login-mark">L</div>
      <h1>LDS Message Studio</h1>
      <p>Чёрная Discohook-like панель отправки сообщений от лица бота.</p>
      <input id="apiBaseInput" type="url" placeholder="Google Apps Script URL или API URL">
      <input id="passwordInput" type="password" placeholder="Panel password / PANEL_ACCESS_KEY" autocomplete="current-password">
      <button type="submit" class="btn primary wide">Войти</button>
      <div id="loginError" class="error-line"></div>
    </form>
  </div>

  <div class="app-shell hidden" id="appView">
    <header class="topbar">
      <div class="top-tabs">
        <button id="settingsBtn" class="btn secondary" type="button">Настройки</button>
        <button id="historyBtn" class="btn secondary" type="button">История</button>
      </div>
      <div class="brand-area">
        <div class="brand-title">LDS Message Studio</div>
        <div class="brand-sub"><span id="botTag">Loading...</span> · black panel</div>
      </div>
    </header>

    <div class="actionbar">
      <div class="action-row">
        <button id="shareBtn" class="btn secondary" type="button">Поделиться</button>
        <button id="backupsBtn" class="btn secondary" type="button">Бэкапы</button>
        <button id="resetBtn" class="btn secondary" type="button">Очистить Всё</button>
      </div>
      <div class="action-row">
        <button id="addWebhookBtn" class="btn primary" type="button">Добавить вебхук</button>
        <span class="send-group">
          <button id="sendBtn" class="btn primary" type="button">Отправить</button>
          <button id="sendMenuBtn" class="btn primary icon" type="button">⌄</button>
        </span>
        <button class="btn secondary mobile-only" id="previewBtn" type="button">Preview</button>
      </div>
    </div>

    <main class="studio" id="studioView">
      <section class="editor-pane" id="editorPane">
        <div id="targetSection" class="panel-block hidden-soft">
          <div class="section-title-line">
            <h3>Настройки отправки</h3>
          </div>
          <div class="target-grid">
            <button id="refreshChannelsBtn" class="btn secondary" type="button">Обновить каналы</button>
            <label>Канал<select id="channelSelect"></select></label>
          </div>
          <label>Редактировать сообщение (опционально)<input id="editMessageInput" placeholder="Message ID или ссылка на сообщение"></label>
          <div class="status" id="statusLine"></div>
        </div>

        <div id="messageList" class="message-list"></div>
        <button id="addMessageBtn" class="wide-add" type="button">💬 Добавить сообщение</button>
      </section>

      <section class="preview-pane" id="previewPane">
        <div class="preview-head">
          <button class="btn secondary mobile-only" id="editorBtn" type="button">Редактор</button>
          <div>
            <strong>Preview</strong>
            <span id="previewChannel">No channel selected</span>
          </div>
          <button id="refreshPreview" class="btn small secondary" type="button">Обновить</button>
        </div>
        <div class="preview-scroll">
          <div class="discord-shell">
            <div class="discord-preview" id="previewMessagesWrap">
              <div class="message-preview empty-preview">Нет данных для предпросмотра.</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="dropdown" id="floatingMenu" aria-hidden="true"></div>
  <div class="dropdown" id="sendDropdown" aria-hidden="true">
    <button type="button" data-send-action="send">📨 Send / edit</button>
    <button type="button" data-send-action="copy">📋 Copy payload</button>
    <button type="button" data-send-action="download">⬇️ Download JSON</button>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Окно</h2>
        <button class="btn small secondary" id="modalClose" type="button">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="app.js"></script>
</body>
</html>
