<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LDS Bot Message Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LDS Message Studio</h1>
      <p>GitHub Pages frontend + bot backend on hosting</p>
    </div>
    <div class="status" id="status">Not connected</div>
  </header>

  <main class="layout">
    <section class="card settings-card">
      <h2>Connection</h2>
      <label>Bot API URL</label>
      <input id="apiUrl" placeholder="https://your-domain.example or http://ip:3000" />
      <label>API key / password</label>
      <input id="apiKey" type="password" placeholder="WEB_API_KEY" />
      <div class="row">
        <button id="saveSettings">Save</button>
        <button id="testConnection" class="secondary">Test</button>
        <button id="loadChannels" class="secondary">Load channels</button>
      </div>
      <p class="hint">API key хранится только в твоём браузере localStorage. В GitHub код его не кладём.</p>
    </section>

    <section class="card composer-card">
      <h2>Message</h2>
      <label>Channel</label>
      <select id="channelSelect"></select>

      <label>Content</label>
      <textarea id="content" rows="5" placeholder="Текст сообщения. Для пинга используй <@user_id> или <@&role_id>."></textarea>

      <div class="toggle-grid">
        <label class="check"><input id="allowUserPings" type="checkbox" checked /> User pings</label>
        <label class="check"><input id="allowRolePings" type="checkbox" checked /> Role pings</label>
        <label class="check muted"><input type="checkbox" disabled /> @everyone/@here blocked</label>
      </div>

      <details class="helper">
        <summary>Role mention helper</summary>
        <div class="row">
          <button id="loadRoles" class="secondary">Load roles for selected server</button>
          <select id="roleSelect"></select>
          <button id="insertRoleMention" class="secondary">Insert role mention</button>
        </div>
      </details>

      <div class="split-title">
        <h3>Embeds</h3>
        <button id="addEmbed" class="secondary">+ Embed</button>
      </div>
      <div id="embeds"></div>

      <div class="split-title">
        <h3>Link buttons</h3>
        <button id="addButton" class="secondary">+ Button</button>
      </div>
      <div id="buttons"></div>

      <div class="actions">
        <button id="sendMessage">Send</button>
        <button id="editMessage" class="secondary">Edit bot message</button>
        <input id="editMessageId" placeholder="message ID or message URL" />
      </div>

      <div class="actions">
        <button id="exportJson" class="secondary">Export JSON</button>
        <button id="importJson" class="secondary">Import JSON</button>
        <button id="saveTemplate" class="secondary">Save template</button>
        <button id="loadTemplate" class="secondary">Load template</button>
        <button id="clearAll" class="danger">Clear</button>
      </div>

      <textarea id="jsonBox" rows="8" placeholder="Import / Export JSON"></textarea>
    </section>

    <section class="card preview-card">
      <div class="split-title">
        <h2>Preview</h2>
        <button id="refreshPreview" class="secondary">Refresh</button>
      </div>
      <div class="discord-preview" id="preview"></div>
      <div class="result" id="result"></div>
    </section>
  </main>

  <template id="embedTemplate">
    <div class="embed-editor">
      <div class="split-title">
        <h4>Embed</h4>
        <button class="danger small remove-embed">Remove</button>
      </div>
      <div class="grid2">
        <div><label>Title</label><input data-key="title" maxlength="256" /></div>
        <div><label>Title URL</label><input data-key="url" placeholder="https://..." /></div>
      </div>
      <label>Description</label>
      <textarea data-key="description" rows="4" maxlength="4096"></textarea>
      <div class="grid3">
        <div><label>Color</label><input data-key="color" type="color" value="#5865f2" /></div>
        <div><label>Thumbnail URL</label><input data-key="thumbnail_url" placeholder="https://..." /></div>
        <div><label>Image URL</label><input data-key="image_url" placeholder="https://..." /></div>
      </div>
      <div class="grid3">
        <div><label>Author name</label><input data-key="author.name" /></div>
        <div><label>Author URL</label><input data-key="author.url" placeholder="https://..." /></div>
        <div><label>Author icon URL</label><input data-key="author.icon_url" placeholder="https://..." /></div>
      </div>
      <div class="grid3">
        <div><label>Footer text</label><input data-key="footer.text" /></div>
        <div><label>Footer icon URL</label><input data-key="footer.icon_url" placeholder="https://..." /></div>
        <label class="check timestamp"><input data-key="timestamp" type="checkbox" /> Timestamp</label>
      </div>
      <div class="split-title">
        <h4>Fields</h4>
        <button class="secondary small add-field">+ Field</button>
      </div>
      <div class="fields"></div>
    </div>
  </template>

  <template id="fieldTemplate">
    <div class="field-editor">
      <div><label>Name</label><input data-field="name" maxlength="256" /></div>
      <div><label>Value</label><textarea data-field="value" rows="2" maxlength="1024"></textarea></div>
      <label class="check"><input data-field="inline" type="checkbox" /> Inline</label>
      <button class="danger small remove-field">Remove</button>
    </div>
  </template>

  <template id="buttonTemplate">
    <div class="button-editor">
      <div><label>Label</label><input data-button="label" maxlength="80" /></div>
      <div><label>URL</label><input data-button="url" placeholder="https://..." /></div>
      <button class="danger small remove-button">Remove</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
